version: 2.1

orbs:
  nx: nrwl/nx@1.7.0
  utils: ethereum-optimism/circleci-utils@1.0.27

commands:
  prepare-snapshot:
    description: 'Prepare the snapshot name'
    steps:
      - run:
          name: Setup snapshot name
          command: |
            SNAPSHOT_NAME=${CIRCLE_BRANCH}
            echo "Will create snapshot using name $SNAPSHOT_NAME"
            echo "export SNAPSHOT_NAME=${SNAPSHOT_NAME}" >> "$BASH_ENV"
      - run:
          name: Prepare changeset version environment
          command: |
            echo "export GITHUB_TOKEN=${GITHUB_TOKEN_GOVERNANCE}" >> "$BASH_ENV"
      - run:
          name: Create snapshot versions
          command: pnpm release:version:snapshot

  setup:
    description: 'Setup Node.js environment with pnpm'
    steps:
      - run:
          name: Set GITHUB_TOKEN for mise
          command: echo 'export GITHUB_TOKEN=${MISE_GITHUB_TOKEN}' >> $BASH_ENV
      - utils/checkout-with-mise # Install dependencies
      - run:
          name: Install dependencies
          environment:
            NPM_TOKEN: nada
          command: |
            pnpm i --frozen-lockfile

jobs:
  publish-to-npm:
    docker:
      - image: cimg/node:22.14
    resource_class: large
    parameters:
      prepare-snapshot:
        type: boolean
        default: false
    steps:
      - setup
      - run:
          name: Install npm with OIDC trusted publishing support
          command: npm install -g npm@11.12.1
      - run:
          name: Build projects
          environment:
            NPM_TOKEN: nada
          command: NODE_OPTIONS='--max-old-space-size=4096' pnpm nx run-many --target=build --parallel=1
      - run:
          name: Obtain OIDC token for npm trusted publishing
          command: |
            set -e
            NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud":"npm:registry.npmjs.org"}')
            if [ -z "$NPM_ID_TOKEN" ]; then
              echo "ERROR: circleci run oidc get returned an empty token" >&2
              exit 1
            fi
            echo "OIDC token fetched (length=${#NPM_ID_TOKEN})"
            echo "export NPM_ID_TOKEN=$NPM_ID_TOKEN" >> "$BASH_ENV"

      - when:
          condition:
            equal: [<< parameters.prepare-snapshot >>, true]
          steps:
            - prepare-snapshot

      - utils/changesets:
          createGithubReleases: false
          publish: 'pnpm release:publish'
          version: 'pnpm release:version'

  # Shared install and build step
  install-and-build:
    docker:
      - image: cimg/node:22.14
    resource_class: large
    steps:
      - setup
      - run:
          name: Build projects
          command: NODE_OPTIONS='--max-old-space-size=4096' pnpm nx run-many --target=build --parallel=1
      - persist_to_workspace:
          root: .
          paths:
            - .

  # SDK checks
  check-sdk:
    docker:
      - image: cimg/node:20.11
    resource_class: large
    steps:
      - attach_workspace:
          at: .
      - run:
          name: TypeCheck SDK
          command: cd packages/sdk && pnpm typecheck
      - run:
          name: Lint SDK
          command: cd packages/sdk && pnpm lint
      - run:
          name: Test SDK
          command: cd packages/sdk && pnpm test

  # CLI checks
  check-cli:
    docker:
      - image: cimg/node:20.11
    resource_class: large
    steps:
      - attach_workspace:
          at: .
      - run:
          name: TypeCheck CLI
          command: cd packages/cli && pnpm typecheck
      - run:
          name: Lint CLI
          command: cd packages/cli && pnpm lint
      - run:
          name: Test CLI
          command: cd packages/cli && pnpm test

  # Backend checks
  check-backend:
    docker:
      - image: cimg/node:20.11
    resource_class: large
    steps:
      - attach_workspace:
          at: .
      - run:
          name: TypeCheck Backend
          command: cd packages/demo/backend && pnpm typecheck
      - run:
          name: Lint Backend
          command: cd packages/demo/backend && pnpm lint
      - run:
          name: Test Backend
          command: cd packages/demo/backend && pnpm test

  # Frontend checks
  check-frontend:
    docker:
      - image: cimg/node:20.11
    resource_class: large
    steps:
      - attach_workspace:
          at: .
      - run:
          name: TypeCheck Frontend
          command: cd packages/demo/frontend && pnpm typecheck
      - run:
          name: Lint Frontend
          command: cd packages/demo/frontend && pnpm lint
      - run:
          name: Test Frontend
          command: cd packages/demo/frontend && pnpm test

  # Contracts checks
  check-contracts:
    docker:
      - image: cimg/node:20.11
    resource_class: large
    steps:
      - setup
      - run:
          name: Build Contracts
          command: cd packages/demo/contracts && pnpm build
      - run:
          name: Test Contracts
          command: cd packages/demo/contracts && pnpm test

workflows:
  release:
    jobs:
      - publish-to-npm:
          name: Publish new versions
          context:
            - circleci-repo-actions # for GITHUB_TOKEN_GOVERNANCE
            - circleci-repo-readonly-authenticated-github-token #needed for MISE
          filters:
            branches:
              only: main

      - publish-to-npm:
          name: Publish snapshot versions
          prepare-snapshot: true
          context:
            - circleci-repo-actions # for GITHUB_TOKEN_GOVERNANCE
            - circleci-repo-readonly-authenticated-github-token #needed for MISE
          filters:
            branches:
              only: main

  check-workflow:
    jobs:
      - install-and-build:
          context:
            - circleci-repo-readonly-authenticated-github-token
      - check-sdk:
          requires:
            - install-and-build
          context:
            - circleci-repo-readonly-authenticated-github-token
      - check-cli:
          requires:
            - install-and-build
          context:
            - circleci-repo-readonly-authenticated-github-token
      - check-backend:
          requires:
            - install-and-build
          context:
            - circleci-repo-readonly-authenticated-github-token
      - check-frontend:
          requires:
            - install-and-build
          context:
            - circleci-repo-readonly-authenticated-github-token
      - check-contracts:
          context:
            - circleci-repo-readonly-authenticated-github-token
